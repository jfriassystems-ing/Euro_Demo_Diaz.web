<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ===== TÍTULO Y SEO ===== -->
    <title>Finalizar Pedido - EUROMODADIAZ</title>
    <meta name="description" content="Finaliza tu pedido en EUROMODADIAZ. Completa tus datos de contacto y confirma tu compra.">
    <meta name="robots" content="noindex, follow">
    
    <!-- ===== OPEN GRAPH ===== -->
    <meta property="og:title" content="Finalizar Pedido - EUROMODADIAZ">
    <meta property="og:description" content="Finaliza tu pedido en EUROMODADIAZ.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://euromodadiaz.vercel.app/checkout">
    
    <!-- ===== CSS ===== -->
    <link rel="stylesheet" href="src/css/style.css">
    <link rel="stylesheet" href="src/css/checkout.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- ===== FAVICON ===== -->
    <link rel="icon" href="src/assets/favicon.ico" type="image/x-icon">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="/">
                        <img src="src/assets/logo.png" alt="EUROMODADIAZ" onerror="this.style.display='none'">
                        <span>EUROMODADIAZ</span>
                    </a>
                </div>
                <div class="header-actions">
                    <a href="index.html" class="btn-back">
                        <i class="fas fa-arrow-left"></i> Seguir comprando
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== CHECKOUT ===== -->
    <section class="checkout-section">
        <div class="container">
            <div class="checkout-container">
                <!-- Resumen del pedido -->
                <div class="checkout-summary">
                    <h2>Resumen del Pedido</h2>
                    <div class="checkout-items" id="checkoutItems">
                        <p class="empty-cart">Tu carrito está vacío</p>
                    </div>
                    <div class="checkout-total">
                        <span>Total:</span>
                        <span id="checkoutTotal">RD$ 0.00</span>
                    </div>
                </div>

                <!-- Formulario -->
                <div class="checkout-form">
                    <h2>Datos de Contacto</h2>
                    <form id="checkoutForm">
                        <div class="form-group">
                            <label for="nombre">Nombre completo *</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
                        </div>

                        <div class="form-group">
                            <label for="telefono">Teléfono *</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 809-555-1234" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Correo electrónico</label>
                            <input type="email" id="email" name="email" placeholder="Ej: juan@email.com">
                        </div>

                        <div class="form-group">
    <label for="direccion">Dirección de entrega *</label>
    <div class="direccion-group">
        <input type="text" id="direccion" name="direccion" placeholder="Calle, número, sector" required>
       <button type="button" class="btn-ubicacion" data-action="ubicacion">
            <i class="fas fa-location-dot"></i>
        </button>
    </div>
    <small class="help-text">Haz clic en el botón 📍 para compartir tu ubicación automáticamente</small>
</div>


                        <div class="form-group">
                            <label for="referencia">Referencia (opcional)</label>
                            <input type="text" id="referencia" name="referencia" placeholder="Punto de referencia, cerca de...">
                        </div>

                        <div class="form-group">
                            <label for="ciudad">Ciudad *</label>
                            <select id="ciudad" name="ciudad" required>
                                <option value="">Selecciona tu ciudad</option>
                                <option value="Santo Domingo">Santo Domingo</option>
                                <option value="Santiago">Santiago</option>
                                <option value="La Vega">La Vega</option>
                                <option value="San Francisco de Macorís">San Francisco de Macorís</option>
                                <option value="Puerto Plata">Puerto Plata</option>
                                <option value="La Romana">La Romana</option>
                                <option value="San Pedro de Macorís">San Pedro de Macorís</option>
                                <option value="Higüey">Higüey</option>
                                <option value="Baní">Baní</option>
                                <option value="Moca">Moca</option>
                                <option value="Bonao">Bonao</option>
                                <option value="Barahona">Barahona</option>
                                <option value="Azua">Azua</option>
                                <option value="San Juan">San Juan</option>
                                <option value="Otra">Otra</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="notas">Notas adicionales (opcional)</label>
                            <textarea id="notas" name="notas" rows="3" placeholder="Alguna indicación especial..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="metodo_pago">Método de pago *</label>
                            <select id="metodo_pago" name="metodo_pago" required>
                                <option value="">Selecciona un método</option>
                                <option value="Efectivo">Efectivo (contra entrega)</option>
                                <option value="Transferencia">Transferencia bancaria</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-submit" id="submitBtn">
                            <i class="fas fa-check"></i> Confirmar Pedido
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 EUROMODADIAZ - Todos los derechos reservados</p>
            <p>República Dominicana</p>
        </div>
    </footer>

    <script src="src/js/checkout.js"></script>
</body>
</html>
